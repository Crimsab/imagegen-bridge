site_name: Imagegen Bridge
site_description: Image generation from your Codex subscription through a CLI, API, dashboard, and typed SDKs.
site_url: https://crimsab.github.io/imagegen-bridge/
repo_name: Crimsab/imagegen-bridge
repo_url: https://github.com/Crimsab/imagegen-bridge
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Crimsab. Released under the MIT License.

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: assets/icon.png
  favicon: assets/icon.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Use the bridge:
      - Command-line interface: cli.md
      - HTTP API: api.md
      - SDKs: sdks.md
  - Operate it:
      - Deployment: deployment.md
      - Testing: testing.md
      - Releasing: releasing.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Crimsab/imagegen-bridge
      name: Imagegen Bridge on GitHub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/imagegen-bridge-cli
      name: Imagegen Bridge on crates.io
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/imagegen-bridge/
      name: Imagegen Bridge on PyPI
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/imagegen-bridge
      name: Imagegen Bridge on npm

validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
