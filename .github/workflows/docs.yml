name: Documentation

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - docs-requirements.in
      - docs-requirements.lock
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish GitHub Pages
    if: ${{ github.event.repository.visibility == 'public' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.2

      - name: Create documentation environment
        run: uv venv --python 3.13 .venv-docs

      - name: Install locked documentation dependencies
        run: >-
          uv pip install --python .venv-docs/bin/python
          --require-hashes -r docs-requirements.lock

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build documentation strictly
        run: .venv-docs/bin/mkdocs build --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
          retention-days: 1

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
