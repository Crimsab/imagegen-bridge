name: Resilience soak

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      soak_seconds:
        description: Offline synthetic soak duration
        required: false
        default: "300"

permissions:
  contents: read

concurrency:
  group: resilience-soak
  cancel-in-progress: false

jobs:
  soak:
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Run load, stress, spike, soak, and dependency fault fixtures
        env:
          SOAK_SECONDS: ${{ inputs.soak_seconds || '300' }}
        run: >-
          bun run tools/resilience-harness.ts
          --scenario all
          --soak-seconds "$SOAK_SECONDS"
          --seed 7
          --json
