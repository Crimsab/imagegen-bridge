name: Publish packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string
      publish_crates:
        description: Publish Rust crates
        required: false
        default: true
        type: boolean
      publish_pypi:
        description: Publish the Python SDK
        required: false
        default: true
        type: boolean
      publish_typescript:
        description: Publish the TypeScript SDK
        required: false
        default: true
        type: boolean
      publish_container:
        description: Publish the GHCR image
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify package versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag and package versions
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ inputs.tag }}"
          gh release view "$version" --repo "$GITHUB_REPOSITORY" >/dev/null
          version="${version#v}"
          cargo metadata --no-deps --format-version 1 |
            jq -e --arg version "$version" 'all(.packages[]; .version == $version)'
          python3 - "$version" <<'PY'
          import pathlib
          import sys
          import tomllib

          version = sys.argv[1]
          data = tomllib.loads(pathlib.Path("sdks/python/pyproject.toml").read_text())
          assert data["project"]["version"] == version
          PY
          node -e 'const p=require("./sdks/typescript/package.json"); if(p.version!==process.argv[1]) process.exit(1)' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  crates:
    name: crates.io
    needs: verify
    if: ${{ inputs.publish_crates }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, resolved 2026-07-14
        with:
          toolchain: 1.94.0

      - name: Authenticate with crates.io using OIDC
        id: crates_io_auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish Rust crates in dependency order
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          OIDC_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
          BOOTSTRAP_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${OIDC_TOKEN:-}" ]]; then
            token="$OIDC_TOKEN"
          elif [[ -n "${BOOTSTRAP_TOKEN:-}" ]]; then
            echo "::warning::Using the bootstrap crates.io token. Configure Trusted Publishing for every crate, then delete CARGO_REGISTRY_TOKEN."
            token="$BOOTSTRAP_TOKEN"
          else
            echo "::error::crates.io authentication failed and no bootstrap token is configured."
            exit 1
          fi
          unset OIDC_TOKEN BOOTSTRAP_TOKEN
          export CARGO_REGISTRY_TOKEN="$token"

          crates=(
            imagegen-bridge-core
            imagegen-bridge-artifacts
            imagegen-bridge-codex-app-server
            imagegen-bridge-codex-responses
            imagegen-bridge-runtime
            imagegen-bridge-config
            imagegen-bridge
            imagegen-bridge-server
            imagegen-bridge-cli
          )

          crate_available() {
            local status
            status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --max-time 15 --retry 3 --retry-connrefused \
              --user-agent 'imagegen-bridge-release/0.1' \
              "https://crates.io/api/v1/crates/$1/$VERSION")"
            [[ "$status" == "200" ]]
          }

          crate_exists() {
            local status
            status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --max-time 15 --retry 3 --retry-connrefused \
              --user-agent 'imagegen-bridge-release/0.1' \
              "https://crates.io/api/v1/crates/$1")"
            [[ "$status" == "200" ]]
          }

          retry_delay() {
            local log_file="$1"
            local retry_at
            local retry_epoch
            local now_epoch
            local delay=90

            retry_at="$(
              sed -nE 's/.*Please try again after (.* GMT) and see.*/\1/p' "$log_file" |
                tail -1
            )"
            if [[ -n "$retry_at" ]]; then
              now_epoch="$(date +%s)"
              retry_epoch="$(date --date="$retry_at" +%s)"
              delay="$((retry_epoch - now_epoch + 15))"
              if [[ "$delay" -lt 30 ]]; then
                delay=30
              elif [[ "$delay" -gt 900 ]]; then
                delay=900
              fi
            fi
            echo "$delay"
          }

          for crate in "${crates[@]}"; do
            if crate_available "$crate"; then
              echo "$crate $VERSION is already published; skipping."
              continue
            fi

            new_crate=false
            if ! crate_exists "$crate"; then
              new_crate=true
            fi

            published=false
            for attempt in 1 2 3; do
              publish_log="$(mktemp)"
              if cargo publish --locked --package "$crate" 2>&1 | tee "$publish_log"; then
                rm -f "$publish_log"
                published=true
                break
              fi

              if crate_available "$crate"; then
                rm -f "$publish_log"
                published=true
                break
              fi

              if [[ "$attempt" -lt 3 ]]; then
                delay="$(retry_delay "$publish_log")"
                echo "::warning::$crate publish attempt $attempt failed; waiting $delay seconds before retrying."
                rm -f "$publish_log"
                sleep "$delay"
              else
                rm -f "$publish_log"
              fi
            done

            if [[ "$published" != "true" ]]; then
              echo "::error::$crate $VERSION is still unavailable after three attempts."
              exit 1
            fi

            if [[ "$new_crate" == "true" && "$crate" != "imagegen-bridge-cli" ]]; then
              echo "New crate published; waiting 90 seconds before creating the next crate."
              sleep 90
            fi
          done

  pypi:
    name: PyPI
    needs: verify
    if: ${{ inputs.publish_pypi }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.2

      - name: Build wheel and source distribution
        working-directory: sdks/python
        run: uv build --build-constraints build-constraints.txt --require-hashes

      - name: Publish to PyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdks/python/dist/

  npm:
    name: npm
    needs: verify
    if: ${{ inputs.publish_typescript }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, resolved 2026-07-14
        with:
          toolchain: 1.94.0

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install locked dependencies
        working-directory: sdks/typescript
        run: bun install --frozen-lockfile

      - name: Build shared SDK contract server
        run: cargo build --locked -p imagegen-bridge-sdk-mock-server

      - name: Test and build package
        working-directory: sdks/typescript
        run: |
          bun run lint
          bun run typecheck
          bun test
          bun run build
          bun run test:node

      - name: Install npm with trusted-publishing support
        run: npm install --global npm@11.18.0

      - name: Publish the npm package
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          package_status="$(
            curl --silent --output /dev/null --write-out '%{http_code}' \
              --max-time 15 --retry 3 --retry-connrefused \
              "https://registry.npmjs.org/imagegen-bridge/$VERSION"
          )"

          if [[ "$package_status" == "200" ]]; then
            echo "imagegen-bridge@$VERSION is already published; skipping."
          elif [[ "$package_status" == "404" ]]; then
            if ! npm publish --access public --provenance; then
              echo "::error::The first publish requires a granular automation token created with Bypass 2FA enabled. After the package exists, configure Trusted Publishing and delete NPM_TOKEN."
              exit 1
            fi
          else
            echo "::error::Unexpected registry response: HTTP $package_status"
            exit 1
          fi

  ghcr-build:
    name: GHCR build (${{ matrix.platform }})
    needs: verify
    if: ${{ inputs.publish_container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/crimsab/imagegen-bridge
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Prepare platform artifact name
        id: platform
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "name=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push platform image by digest
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/crimsab/imagegen-bridge,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: IMAGE_VERSION=${{ needs.verify.outputs.version }}

      - name: Export platform digest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ steps.platform.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  ghcr:
    name: GHCR manifest
    needs: [verify, ghcr-build]
    if: ${{ inputs.publish_container }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/crimsab/imagegen-bridge
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Create and verify multi-architecture manifest
        id: manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/crimsab/imagegen-bridge
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          mapfile -t digests < <(find . -maxdepth 1 -type f -printf '%f\n' | sort)
          [[ "${#tags[@]}" -gt 0 ]]
          [[ "${#digests[@]}" -eq 2 ]]

          args=()
          for tag in "${tags[@]}"; do
            args+=(--tag "$tag")
          done
          for digest in "${digests[@]}"; do
            [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
            args+=("$IMAGE@sha256:$digest")
          done
          docker buildx imagetools create "${args[@]}"

          manifest_digest="$(
            docker buildx imagetools inspect "$IMAGE:$VERSION" \
              --format '{{json .Manifest}}' | jq -er '.digest'
          )"
          [[ "$manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$manifest_digest" >> "$GITHUB_OUTPUT"

      - name: Attest container provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/crimsab/imagegen-bridge
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
