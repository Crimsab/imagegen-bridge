name: Publish packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify package versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag and package versions
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ inputs.tag }}"
          gh release view "$version" --repo "$GITHUB_REPOSITORY" >/dev/null
          version="${version#v}"
          cargo metadata --no-deps --format-version 1 |
            jq -e --arg version "$version" 'all(.packages[]; .version == $version)'
          python3 - "$version" <<'PY'
          import pathlib
          import sys
          import tomllib

          version = sys.argv[1]
          data = tomllib.loads(pathlib.Path("sdks/python/pyproject.toml").read_text())
          assert data["project"]["version"] == version
          PY
          node -e 'const p=require("./sdks/typescript/package.json"); if(p.version!==process.argv[1]) process.exit(1)' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  crates:
    name: crates.io
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, resolved 2026-07-14
        with:
          toolchain: 1.94.0

      - name: Authenticate with crates.io using OIDC
        id: crates_io_auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish Rust crates in dependency order
        env:
          OIDC_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
          BOOTSTRAP_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${OIDC_TOKEN:-}" ]]; then
            token="$OIDC_TOKEN"
          elif [[ -n "${BOOTSTRAP_TOKEN:-}" ]]; then
            echo "::warning::Using the bootstrap crates.io token. Configure Trusted Publishing for every crate, then delete CARGO_REGISTRY_TOKEN."
            token="$BOOTSTRAP_TOKEN"
          else
            echo "::error::crates.io authentication failed and no bootstrap token is configured."
            exit 1
          fi
          unset OIDC_TOKEN BOOTSTRAP_TOKEN
          export CARGO_REGISTRY_TOKEN="$token"
          cargo publish --locked --workspace \
            --exclude imagegen-bridge-schema-gen \
            --exclude imagegen-bridge-sdk-mock-server

  pypi:
    name: PyPI
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.2

      - name: Build wheel and source distribution
        working-directory: sdks/python
        run: uv build --build-constraints build-constraints.txt --require-hashes

      - name: Publish to PyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdks/python/dist/

  npm:
    name: npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install locked dependencies
        working-directory: sdks/typescript
        run: bun install --frozen-lockfile

      - name: Test and build package
        working-directory: sdks/typescript
        run: |
          bun run lint
          bun run typecheck
          bun test
          bun run build
          bun run test:node

      - name: Install npm with trusted-publishing support
        run: npm install --global npm@11.5.1

      - name: Publish to npm
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  ghcr:
    name: GHCR
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out released source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/crimsab/imagegen-bridge
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Build and push multi-architecture image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: IMAGE_VERSION=${{ needs.verify.outputs.version }}

      - name: Attest container provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/crimsab/imagegen-bridge
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
