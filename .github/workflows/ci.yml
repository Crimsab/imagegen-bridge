name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: -D warnings
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, resolved 2026-07-14
        with:
          toolchain: 1.94.0
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check generated schema
        run: cargo run --locked -p imagegen-bridge-schema-gen -- --check

      - name: Check workspace
        run: cargo check --locked --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets

      - name: Build documentation
        run: cargo doc --locked --workspace --no-deps

      - name: Validate publishable crates
        run: >-
          cargo publish --locked --workspace --dry-run
          --exclude imagegen-bridge-schema-gen
          --exclude imagegen-bridge-sdk-mock-server

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, resolved 2026-07-14
        with:
          toolchain: 1.94.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.2

      - name: Build shared SDK contract server
        run: cargo build --locked -p imagegen-bridge-sdk-mock-server

      - name: Install locked Python SDK test environment
        working-directory: sdks/python
        run: uv sync --locked --extra test --no-install-project

      - name: Check Python formatting
        working-directory: sdks/python
        run: uv run --no-sync ruff format --check .

      - name: Check Python lint
        working-directory: sdks/python
        run: uv run --no-sync ruff check --output-format github .

      - name: Check Python types
        working-directory: sdks/python
        env:
          PYTHONPATH: src
        run: uv run --no-sync mypy

      - name: Test Python SDK
        working-directory: sdks/python
        env:
          PYTHONPATH: src
        run: uv run --no-sync pytest

      - name: Build Python packages from hashed build requirements
        working-directory: sdks/python
        run: uv build --build-constraints build-constraints.txt --require-hashes

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, resolved 2026-07-14
        with:
          toolchain: 1.94.0

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Build shared SDK contract server
        run: cargo build --locked -p imagegen-bridge-sdk-mock-server

      - name: Install locked TypeScript SDK environment
        working-directory: sdks/typescript
        run: bun install --frozen-lockfile

      - name: Check TypeScript formatting and lint
        working-directory: sdks/typescript
        run: bun run lint

      - name: Check TypeScript types
        working-directory: sdks/typescript
        run: bun run typecheck

      - name: Build TypeScript package
        working-directory: sdks/typescript
        run: bun run build

      - name: Test TypeScript SDK on Bun
        working-directory: sdks/typescript
        run: bun test

      - name: Test built SDK on Node
        working-directory: sdks/typescript
        run: bun run test:node

      - name: Validate package contents
        working-directory: sdks/typescript
        run: bun pm pack --dry-run --quiet

      - name: Validate agent skill discovery
        run: bunx skills@1.5.17 add . --list | grep -q generate-images-with-bridge

  container:
    name: Hardened container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build and smoke-test non-root image
        run: ./tests/container-smoke.sh
