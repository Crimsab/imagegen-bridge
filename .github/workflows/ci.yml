name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: -D warnings
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check generated schema
        run: cargo run --locked -p imagegen-bridge-schema-gen -- --check

      - name: Check workspace
        run: cargo check --locked --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets

      - name: Build documentation
        run: cargo doc --locked --workspace --no-deps

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.2

      - name: Build shared SDK contract server
        run: cargo build --locked -p imagegen-bridge-sdk-mock-server

      - name: Install locked Python SDK environment
        working-directory: sdks/python
        run: uv sync --locked --extra test

      - name: Check Python formatting
        working-directory: sdks/python
        run: uv run ruff format --check .

      - name: Check Python lint
        working-directory: sdks/python
        run: uv run ruff check --output-format github .

      - name: Check Python types
        working-directory: sdks/python
        run: uv run mypy

      - name: Test Python SDK
        working-directory: sdks/python
        run: uv run pytest

      - name: Build Python packages
        working-directory: sdks/python
        run: uv run python -m build

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Build shared SDK contract server
        run: cargo build --locked -p imagegen-bridge-sdk-mock-server

      - name: Install locked TypeScript SDK environment
        working-directory: sdks/typescript
        run: bun install --frozen-lockfile

      - name: Check TypeScript formatting and lint
        working-directory: sdks/typescript
        run: bun run lint

      - name: Check TypeScript types
        working-directory: sdks/typescript
        run: bun run typecheck

      - name: Build TypeScript package
        working-directory: sdks/typescript
        run: bun run build

      - name: Test TypeScript SDK on Bun
        working-directory: sdks/typescript
        run: bun test

      - name: Test built SDK on Node
        working-directory: sdks/typescript
        run: bun run test:node

      - name: Validate package contents
        working-directory: sdks/typescript
        run: bun pm pack --dry-run --quiet

  container:
    name: Hardened container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build and smoke-test non-root image
        run: ./tests/container-smoke.sh
