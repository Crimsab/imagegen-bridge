version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
    groups:
      rust:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /sdks/python
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /sdks/typescript
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
    groups:
      typescript:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
    groups:
      container:
        patterns: ["*"]
