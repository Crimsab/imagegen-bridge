version = 1
default_provider = "codex-responses"

[inputs]
local_roots = ["/workspace"]

[inputs.remote]
enabled = false

[artifacts]
root = "/data/artifacts"

[providers.codex_app_server]
enabled = true
executable = "/usr/local/bin/codex"
args = []
cwd = "/workspace"
session_database = "/data/state/sessions.sqlite3"

[providers.codex_responses]
enabled = true

[providers.openai]
enabled = false

[server]
bind = "0.0.0.0:8787"
bearer_token_env = "IMAGEGEN_BRIDGE_BEARER_TOKEN"
max_body_bytes = 83886080
max_header_bytes = 32768
max_connections = 256
read_timeout_ms = 0
write_timeout_ms = 30000

[server.metrics]
enabled = true

[server.tracing]
enabled = true

[server.jobs]
enabled = true
database = "/data/state/jobs.sqlite3"
max_pending = 1000
max_running = 4
retention_secs = 604800
max_retained = 10000
